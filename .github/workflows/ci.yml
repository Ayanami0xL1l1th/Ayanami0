name: Sync Rule-for-OCD

permissions:
  contents: write

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v3

      - name: Clone source repo
        run: |
          git clone --depth 1 https://github.com/peiyingyao/Rule-for-OCD.git source_repo

      - name: Copy Clash rules (keep local files)
        run: |
          mkdir -p rule
          rsync -av source_repo/rule/Clash/ rule/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add rule/

          if ! git diff --cached --quiet; then
            git commit -m "Auto sync Rule-for-OCD Clash"
            git push
          else
            echo "No changes"
          fi
