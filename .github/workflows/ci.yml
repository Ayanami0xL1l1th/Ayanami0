name: Sync Rule-for-OCD

# 每天同步，也可以手动触发
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout 本仓库
      - name: Checkout target repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2️⃣ Clone Rule-for-OCD 仓库
      - name: Clone source repo
        run: |
          git clone --depth 1 https://github.com/peiyingyao/Rule-for-OCD.git source_repo

      # 3️⃣ 复制 rule/Clash 到本仓库 rule/
      - name: Copy Clash rules
        run: |
          mkdir -p rule
          rsync -av --delete source_repo/rule/Clash/ rule/

      # 4️⃣ 提交并推送
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rule/
          git diff-index --quiet HEAD || git commit -m "Auto sync Rule-for-OCD Clash"
          git push origin main
